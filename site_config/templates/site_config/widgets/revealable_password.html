{% with id=widget.attrs.id %}
<div class="duo-secret-field">
  <div class="duo-secret-input-row">
    <input
      type="{{ widget.type }}"
      name="{{ widget.name }}"
      {% if widget.value != None %}value="{{ widget.value }}"{% endif %}
      {% include "django/forms/widgets/attrs.html" %}
    />
    <button
      type="button"
      class="duo-secret-toggle btn btn-sm btn-outline-secondary"
      data-target="{{ id }}"
      aria-label="Show value"
    >
      <i class="fas fa-eye" aria-hidden="true"></i>
      <span class="duo-secret-toggle-label">Show</span>
    </button>
  </div>
  {% if widget.configured %}
    <p class="duo-secret-status text-success mb-0">
      <i class="fas fa-check-circle" aria-hidden="true"></i>
      A value is saved. Leave blank to keep it unchanged.
    </p>
  {% endif %}
</div>
{% endwith %}
