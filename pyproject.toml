[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = '''
/(
    migrations
    | \.venv
    | venv
    | __pycache__
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip_glob = ["*/migrations/*", "venv/*", ".venv/*"]

[tool.bandit]
exclude_dirs = ["tests", "*/tests", "*/migrations"]
