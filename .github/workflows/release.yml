name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-notes:
    name: Publish Release Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare environment
        run: cp .env.example .env

      - name: Run release validation
        env:
          SECRET_KEY: ci-test-secret-key
          DEBUG: "False"
          DATABASE_URL: sqlite:///ci.sqlite3
        run: |
          python manage.py check --deploy
          python manage.py migrate --noinput
          python manage.py test --verbosity=1

      - name: Generate changelog
        run: bash .github/scripts/generate-changelog.sh RELEASE_NOTES.md "${{ github.event.release.tag_name }}"

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: backend-release-notes
          path: RELEASE_NOTES.md
          retention-days: 90

      - name: Deploy to Render on release
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          fi

      - name: Verify production health
        env:
          HEALTH_URL: ${{ vars.RENDER_HEALTH_URL || 'https://duobackend.onrender.com/health/' }}
        run: bash .github/scripts/verify-deployment.sh "$HEALTH_URL" 24 15

      - name: Notify release
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: bash .github/scripts/notify.sh success "Backend Release" "Release ${{ github.event.release.tag_name }} published and deployed."
