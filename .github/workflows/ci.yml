name: Backend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare environment
        run: cp .env.example .env

      - name: Django checks
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production-use-only
          DEBUG: "False"
          ALLOWED_HOSTS: localhost,127.0.0.1
          DATABASE_URL: sqlite:///ci.sqlite3
        run: |
          python manage.py check --deploy
          python manage.py migrate --noinput

      - name: Run tests
        env:
          SECRET_KEY: ci-test-secret-key
          DEBUG: "True"
        run: python manage.py test --verbosity=2

  deploy:
    name: Deploy (Render)
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL secret is not set."
            echo "Render may still auto-deploy if the repo is connected in the Render dashboard."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
