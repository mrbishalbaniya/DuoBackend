name: Backend

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  PYTHON_VERSION: "3.11"
  SECRET_KEY: ci-test-secret-key-not-for-production-use-only
  DEBUG: "False"
  ALLOWED_HOSTS: localhost,127.0.0.1,testserver
  DATABASE_URL: sqlite:///ci.sqlite3
  FRONTEND_URL: http://localhost:3000
  CORS_ALLOWED_ORIGINS: http://localhost:3000

jobs:
  validate:
    name: Validate & Test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-ci.txt

      - name: Prepare environment
        run: cp .env.example .env

      - name: Django system checks
        run: python manage.py check --deploy

      - name: Migration drift check
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        env:
          DEBUG: "True"
        run: python manage.py test --verbosity=2

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-logs
          path: |
            ci.sqlite3
          retention-days: 7
          if-no-files-found: ignore

  deploy:
    name: Deploy to Render
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: ${{ vars.RENDER_HEALTH_URL || 'https://duobackend.onrender.com/health/' }}

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL not set — skipping hook trigger."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Verify deployment health
        env:
          HEALTH_URL: ${{ vars.RENDER_HEALTH_URL || 'https://duobackend.onrender.com/health/' }}
        run: bash .github/scripts/verify-deployment.sh "$HEALTH_URL" 18 15

      - name: Notify success
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: bash .github/scripts/notify.sh success "Backend Deployed" "Django API deployed to Render."

      - name: Notify failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: bash .github/scripts/notify.sh failure "Backend Deploy Failed" "Render deployment or health check failed."
