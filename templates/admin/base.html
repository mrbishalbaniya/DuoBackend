{% extends "admin/base.html" %}
{% load i18n %}

{% block extrastyle %}
{{ block.super }}
<style>
  /* Jazzmin 3: bg-body navbar + navbar-dark = invisible white-on-white links */
  .app-header.navbar .nav-link,
  .app-header.navbar .navbar-nav .nav-link,
  .app-header.navbar .btn-navbar,
  .app-header.navbar .form-control-navbar::placeholder {
    color: var(--bs-body-color) !important;
  }
  .app-header.navbar .nav-link:hover,
  .app-header.navbar .nav-link:focus,
  .app-header.navbar .nav-link.show {
    color: var(--bs-primary) !important;
  }
  .app-header.navbar .form-control-navbar {
    color: var(--bs-body-color);
    background-color: var(--bs-body-bg);
    border: 1px solid var(--bs-border-color);
  }
  .content-header .breadcrumb-item a,
  .content-header .breadcrumb-item.active {
    color: var(--bs-body-color);
  }
  .main-header .navbar-nav.ms-auto {
    flex-shrink: 0;
  }
  .main-header form.d-flex,
  .app-header form.d-flex {
    max-width: 200px;
  }
  .main-header .form-control-navbar,
  .app-header .form-control-navbar {
    min-width: 0;
  }
  @media (max-width: 1200px) {
    .main-header form.d-flex,
    .app-header form.d-flex {
      max-width: 150px;
    }
  }
</style>
{% endblock %}

{% block extrajs %}
{{ block.super }}
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const toggle = document.querySelector('.navbar-nav.ms-auto .nav-item.dropdown > a[title]');
    if (toggle && !toggle.getAttribute("title")) {
      toggle.setAttribute("title", "{% trans 'Account & Logout' %}");
    }
  });
</script>
{% endblock %}
