# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect this repo in Render and apply the blueprint, or deploy manually from the dashboard.

services:
  - type: web
    name: duo-backend
    runtime: python
    region: singapore
    plan: free
    branch: main
    buildCommand: >-
      pip install -r requirements-prod.txt &&
      python manage.py collectstatic --noinput
    startCommand: >-
      python manage.py migrate --noinput &&
      python manage.py ensure_update_service &&
      python manage.py ensure_site_settings &&
      python manage.py ensure_superuser &&
      daphne -b 0.0.0.0 -p $PORT duo_project.asgi:application
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        fromService:
          type: web
          name: duo-backend
          property: host
      - key: DATABASE_URL
        fromDatabase:
          name: duo-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: duo-redis
          property: connectionString
      - key: REDIS_SSL_VERIFY
        value: "false"
      - key: CELERY_ENABLED
        value: "true"
      - key: CELERY_TASK_EAGER
        value: "false"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_UPLOAD_PRESET
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      - key: GOOGLE_OAUTH_ALLOWED_REDIRECT_URIS
        sync: false
      - key: ESEWA_PRODUCT_CODE
        sync: false
      - key: ESEWA_SECRET_KEY
        sync: false
      - key: ESEWA_SUCCESS_URL
        sync: false
      - key: ESEWA_FAILURE_URL
        sync: false
      - key: ESEWA_MOBILE_CLIENT_ID
        sync: false
      - key: ESEWA_MOBILE_SECRET_KEY
        sync: false
      - key: ESEWA_MOBILE_LIVE
        value: "False"
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_DELIVERY
        sync: false
      - key: EMAIL_RELAY_SECRET
        sync: false
      - key: NODEMAILER_RELAY_URL
        sync: false
      - key: EMAIL_FROM_NAME
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false

  - type: redis
    name: duo-redis
    region: singapore
    plan: free
    ipAllowList: []

  - type: worker
    name: duo-celery-worker
    runtime: python
    region: singapore
    plan: free
    branch: main
    buildCommand: pip install -r requirements-prod.txt
    startCommand: celery -A duo_project worker -l info --concurrency=2
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService:
          type: web
          name: duo-backend
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: duo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: duo-redis
          property: connectionString
      - key: CELERY_ENABLED
        value: "true"
      - key: CELERY_TASK_EAGER
        value: "false"

  - type: worker
    name: duo-celery-beat
    runtime: python
    region: singapore
    plan: free
    branch: main
    buildCommand: pip install -r requirements-prod.txt
    startCommand: celery -A duo_project beat -l info
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService:
          type: web
          name: duo-backend
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: duo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: duo-redis
          property: connectionString
      - key: CELERY_ENABLED
        value: "true"
      - key: CELERY_TASK_EAGER
        value: "false"

databases:
  - name: duo-db
    region: singapore
    plan: free
    databaseName: duo
    user: duo
