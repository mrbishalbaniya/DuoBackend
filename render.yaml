# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect this repo in Render and apply the blueprint, or deploy manually from the dashboard.

services:
  - type: web
    name: duo-backend
    runtime: python
    region: singapore
    plan: free
    branch: main
    buildCommand: >-
      pip install -r requirements-prod.txt &&
      python manage.py collectstatic --noinput
    startCommand: >-
      python manage.py migrate --noinput &&
      daphne -b 0.0.0.0 -p $PORT duo_project.asgi:application
    healthCheckPath: /api/docs/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        fromService:
          type: web
          name: duo-backend
          property: host
      - key: DATABASE_URL
        fromDatabase:
          name: duo-db
          property: connectionString
      - key: FRONTEND_URL
        value: http://localhost:3000
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:3000,http://localhost:3001,http://localhost:8081,http://localhost:8082
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_UPLOAD_PRESET
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false

databases:
  - name: duo-db
    region: singapore
    plan: free
    databaseName: duo
    user: duo
